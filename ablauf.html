<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hochzeit von Lara und Tobi | Ablauf</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-rose: #ffeff3; 
            --text: #5a5a5a; 
            --gold: #d4af37; 
            --gold-bright: #f9e29c;
        }

        body { 
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-rose); 
            color: var(--text); 
            text-align: center; 
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* NAVIGATION */
        nav { 
            position: fixed; top: 0; width: 100%; display: flex; 
            justify-content: center; align-items: center;
            height: 90px !important; padding: 0 !important;
            background: rgba(255,255,255,0.95); z-index: 2000; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        nav a { 
            font-size: 1rem !important; margin: 0 15px !important; 
            letter-spacing: 2px !important; font-weight: 600 !important;
            text-decoration: none; color: #5a5a5a; text-transform: uppercase;
            position: relative; padding-bottom: 4px; transition: 0.3s;
        }

        nav a:hover { color: var(--gold); }
        nav a::after { 
            content: ''; position: absolute; bottom: 0; left: 50%; 
            width: 0; height: 1px; background: var(--gold); 
            transition: 0.3s; transform: translateX(-50%); 
        }
        nav a:hover::after { width: 100%; }

        /* HEADER */
        header { 
            padding-top: 200px !important; 
            padding-bottom: 40px; 
            animation: fadeIn 1.5s ease-in-out; 
        }

        .fancy-title { 
            font-family: 'Great Vibes', cursive; 
            font-size: 4.5rem; 
            color: var(--gold); 
            margin: 0; 
            font-weight: 400;
            line-height: 1.1;
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            text-transform: uppercase; 
            letter-spacing: 7px; 
            font-size: 2.2rem; 
            color: #4a4a4a; 
            margin: 10px 0 0 0; 
        }

        /* ANIMATIONEN */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @keyframes slideInFromTop {
            from { 
                opacity: 0; 
                transform: translateY(-40px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        /* TIMELINE ELEMENTE */
        .timeline-wrap { max-width: 500px; margin: 40px auto 100px auto; padding: 0 20px; position: relative; }
        
        .timeline-item { 
            position: relative; 
            margin-bottom: 50px; 
            padding-bottom: 30px; 
            z-index: 2; 
            cursor: pointer;
            /* Start-Zustand für Animation */
            opacity: 0; 
            animation: slideInFromTop 0.8s ease-out forwards;
        }

        /* Zeitliche Verzögerung für den Wasserfall-Effekt */
        .timeline-item:nth-child(1) { animation-delay: 0.3s; }
        .timeline-item:nth-child(2) { animation-delay: 0.6s; }
        .timeline-item:nth-child(3) { animation-delay: 0.9s; }
        .timeline-item:nth-child(4) { animation-delay: 1.2s; }

        .timeline-item:not(:last-child)::after {
            content: ''; position: absolute; bottom: -15px; left: 50%;
            width: 1.5px; height: 25px; background: var(--gold);
            opacity: 0.3; transform: translateX(-50%);
        }

        .icon-circle { 
            width: 70px; height: 70px; background: white; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 1.8rem; box-shadow: 0 5px 20px rgba(0,0,0,0.05); 
            margin: 0 auto 12px auto; position: relative; z-index: 5;
            transition: transform 0.3s ease;
        }
        
        .time-label { display: block; font-weight: 600; letter-spacing: 2px; color: var(--gold); font-size: 0.75rem; margin-bottom: 5px; }
        .event-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; color: #4a4a4a; margin: 0; }

        /* HOVER EFFEKTE */
        .icon-circle::before, .icon-circle::after {
            content: ''; position: absolute; opacity: 0; pointer-events: none; z-index: -1;
        }

        .timeline-item:hover .icon-circle { transform: scale(1.1); }

        .event-church:hover .icon-circle::before {
            opacity: 1; width: 12px; height: 12px; margin: -6px; top: 50%; left: 50%;
            background: #f8bbd0; border-radius: 50% 0 50% 0;
            box-shadow: -25px -30px 0 #fce4ec, 25px -30px 0 #f8bbd0, -35px 5px 0 #fce4ec, 35px 5px 0 #f8bbd0;
            animation: explodeOut 2.8s infinite ease-out;
        }

        .event-sekt:hover .icon-circle::after {
            opacity: 1; width: 8px; height: 8px; margin: -4px; top: 50%; left: 50%;
            background: white; border-radius: 50%;
            box-shadow: -20px -35px 0 2px rgba(255,255,255,0.8), 25px -30px 0 3px rgba(212,175,55,0.4), -35px -5px 0 1px rgba(255,255,255,0.9);
            animation: explodeOut 2.5s infinite ease-out;
        }

        .event-dinner:hover .icon-circle::before {
            opacity: 1; content: '✦'; color: var(--gold); font-size: 0.8rem; top: 50%; left: 50%;
            display: flex; align-items: center; justify-content: center;
            text-shadow: -35px -35px 0 var(--gold), 35px -35px 0 var(--gold), -45px 5px 0 var(--gold);
            animation: explodeOut 3.5s infinite ease-out;
        }

        .event-party:hover .icon-circle::before {
            opacity: 1; top: -40px; left: 50%; width: 70px; height: 100px; transform: translateX(-50%);
            background-image: radial-gradient(var(--gold) 1.5px, transparent 1.5px), radial-gradient(var(--gold-bright) 2px, transparent 2px), radial-gradient(var(--gold) 2px, transparent 2px);
            background-size: 25px 30px, 35px 40px, 20px 25px;
            animation: goldRainNarrow 2s infinite linear;
        }

        @keyframes explodeOut {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
        }

        @keyframes goldRainNarrow {
            0% { transform: translate(-50%, -10px); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(-50%, 60px); opacity: 0; }
        }

      @media (max-width: 600px) {
    /* NAVIGATION: Wieder auf 60px für das perfekte Set */
    nav { 
        height: 70px !important; 
    }
    nav a { 
        font-size: 0.75rem !important; 
        margin: 0 6px !important; 
        letter-spacing: 1px !important; 
    }

    /* HEADER: Gleiche Höhe wie auf den anderen Seiten */
    header { 
        padding-top: 100px !important; 
        padding-bottom: 10px !important;
    }
    .fancy-title { 
        font-size: 2.8rem !important; 
    }
    h1 { 
        font-size: 1.3rem !important; 
        letter-spacing: 3px !important; 
    }

    /* ABLAUF-SPEZIFISCH (Falls du eine Liste oder Icons hast) */
    .timeline-item, .event-box {
        width: 100% !important;
        box-sizing: border-box !important;
        padding: 15px !important;
    }
}
    </style>
</head>
<body ontouchstart="">

    <nav>
        <a href="index.html">Home</a>
        <a href="location.html">Location</a>
        <a href="ablauf.html">Ablauf</a>
        <a href="fotos.html">Fotos</a>
        <a href="feedback.html">Feedback</a>
    </nav>

    <header>
        <p class="fancy-title">Unser Tag</p>
        <h1>Der Ablauf</h1>
    </header>

    <div class="timeline-wrap">
        <div class="timeline-item event-church">
            <div class="icon-circle">⛪</div>
            <span class="time-label">13:00 UHR</span>
            <p class="event-name">Kirchliche Trauung</p>
        </div>

        <div class="timeline-item event-sekt">
            <div class="icon-circle">🥂</div>
            <span class="time-label">16:00 UHR</span>
            <p class="event-name">Sektempfang</p>
        </div>

        <div class="timeline-item event-dinner">
            <div class="icon-circle">🍽️</div>
            <span class="time-label">18:30 UHR</span>
            <p class="event-name">Hochzeitsdinner</p>
        </div>

        <div class="timeline-item event-party">
            <div class="icon-circle">🪩</div>
            <span class="time-label">ab 20:00 UHR</span>
            <p class="event-name">Party & Spiele</p>
        </div>
    </div>

</body>
</html>
