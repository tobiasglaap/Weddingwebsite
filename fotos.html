<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hochzeit von Lara und Tobi | Fotos</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --text: #5a5a5a; 
            --gold: #d4af37; 
            --bg: #fefff1; 
        }

        body { 
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg); color: var(--text); text-align: center; 
            overflow-x: hidden; user-select: none; -webkit-user-select: none;
        }

        /* NAVIGATION DESKTOP */
        nav { 
            position: fixed; top: 0; width: 100%; display: flex; 
            justify-content: center; align-items: center;
            height: 90px; background: rgba(255,255,255,0.95); z-index: 2000; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.03); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        nav a { 
            font-size: 1rem; margin: 0 15px; 
            letter-spacing: 2px; font-weight: 600;
            text-decoration: none; color: #5a5a5a; text-transform: uppercase;
            position: relative; padding-bottom: 4px; transition: 0.3s;
        }

        nav a:hover { color: var(--gold); }

        /* HEADER DESKTOP */
        header { 
            padding-top: 200px; 
            padding-bottom: 40px;
            animation: fadeIn 1.5s ease-in-out; 
        }

        .fancy-title { 
            font-family: 'Great Vibes', cursive; font-size: 4.5rem; 
            color: var(--gold); margin: 0 0 10px 0; font-weight: 400;
        }

        h1 { 
            font-family: 'Playfair Display', serif; text-transform: uppercase; 
            letter-spacing: 7px; font-size: 2.2rem; color: #4a4a4a; margin: 0;
        }

        /* RESPONSIVE MASTER-BLOCK (HANDY) */
        @media (max-width: 600px) {
            nav { 
                height: 70px !important; 
            }
            nav a { 
                font-size: 0.75rem !important; 
                margin: 0 6px !important; 
                letter-spacing: 1px !important; 
            }

            header { 
                padding-top: 150px !important; 
                padding-bottom: 30px !important;
            }

            .fancy-title { 
                font-size: 3.5rem !important; 
                margin-bottom: 10px !important;
            }

            h1 { 
                font-size: 1.7rem !important; 
                letter-spacing: 4px !important; 
            }

            .upload-card {
                width: calc(100% - 30px) !important;
                padding: 40px 20px !important;
                margin-top: 20px !important;
            }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* FOTO UPLOAD CARD */
        .upload-card {
            max-width: 550px; margin: 40px auto 100px auto; 
            background: white; padding: 60px 40px; 
            border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 88%; position: relative;
            box-sizing: border-box; /* Verhindert das Wackeln */
        }

        .upload-card::before {
            content: ''; position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2); pointer-events: none;
        }

        .icon-camera { font-size: 3rem; margin-bottom: 20px; display: block; }

        .upload-card p {
            font-size: 1.1rem; line-height: 1.8; color: #777;
            margin-bottom: 30px; font-weight: 300;
        }

        /* BUTTON */
        .drive-btn {
            display: inline-block;
            padding: 18px 40px;
            background: var(--gold);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .drive-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3);
            background: #b8972f;
        }

        .info-small {
            display: block; margin-top: 25px; font-size: 0.75rem;
            color: #999; letter-spacing: 1px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="location.html">Location</a>
        <a href="ablauf.html">Ablauf</a>
        <a href="fotos.html">Fotos</a> 
        <a href="feedback.html">Feedback</a>
    </nav>

    <header>
        <p class="fancy-title">Eure Momente</p>
        <h1>Fotogalerie</h1>
    </header>

    <main class="upload-card">
        <span class="icon-camera">📸</span>
        <p>Wir freuen uns über jeden Schnappschuss unseres großen Tages! Ladet eure Fotos und Videos einfach in unseren gemeinsamen Ordner hoch, damit wir alle Erinnerungen teilen können.</p>
        
        <a href="https://drive.google.com/drive/folders/1GBPwABxVkjZbX8QCKg_GbBoZSybixJxV" target="_blank" class="drive-btn">
            Fotos hochladen
        </a>

        <span class="info-small">Vielen Dank fürs Teilen!</span>
    </main>

  
</body>
</html>
